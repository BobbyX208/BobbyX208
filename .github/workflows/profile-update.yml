name: 🔄 Profile Auto-Update

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours
  workflow_dispatch:          # Manual trigger anytime
  push:
    branches: [main]          # Also runs on every push

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Generate Snake Animation
  # ─────────────────────────────────────────
  snake:
    name: 🐍 Snake Animation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: BobbyX208
          outputs: |
            output/github-snake.svg
            output/github-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: output
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

  # ─────────────────────────────────────────
  # JOB 2: Update Activity Feed
  # ─────────────────────────────────────────
  activity:
    name: 📰 Activity Feed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update GitHub Activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "chore: update activity feed"
          MAX_LINES: 8
          TARGET_FILE: README.md
          README_FILE: README.md

  # ─────────────────────────────────────────
  # JOB 3: Wakapi Stats Card
  # ─────────────────────────────────────────
  wakapi:
    name: ⏱️ Wakapi Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Wakapi Stats
        env:
          WAKAPI_API_KEY: ${{ secrets.WAKAPI_API_KEY }}
        run: |
          curl -s "https://wakapi.dev/api/compat/wakatime/v1/users/current/stats/last_7_days" \
            -H "Authorization: Basic $(echo -n $WAKAPI_API_KEY | base64)" \
            -o wakapi_stats.json

      - name: Generate Wakapi Badge Section
        env:
          WAKAPI_API_KEY: ${{ secrets.WAKAPI_API_KEY }}
        run: |
          python3 << 'EOF'
          import json, base64, urllib.request, os

          api_key = os.environ["WAKAPI_API_KEY"]
          encoded = base64.b64encode(api_key.encode()).decode()

          req = urllib.request.Request(
            "https://wakapi.dev/api/compat/wakatime/v1/users/current/stats/last_7_days",
            headers={"Authorization": f"Basic {encoded}"}
          )

          with urllib.request.urlopen(req) as res:
            data = json.loads(res.read())

          stats = data.get("data", {})
          total = stats.get("human_readable_total", "N/A")
          daily_avg = stats.get("human_readable_daily_average", "N/A")
          languages = stats.get("languages", [])[:5]

          lang_lines = ""
          for lang in languages:
            name = lang["name"]
            pct = lang["percent"]
            hrs = lang.get("text", "")
            bar_filled = int(pct / 5)
            bar = "█" * bar_filled + "░" * (20 - bar_filled)
            lang_lines += f"{name:<12} {bar} {pct:>5.1f}%  {hrs}\n"

          block = f"""<!--WAKAPI_START-->
          ```
          ⏱  Last 7 Days · {total} coded · {daily_avg}/day avg

          {lang_lines.strip()}
          ```
          <!--WAKAPI_END-->"""

          with open("README.md", "r") as f:
            content = f.read()

          import re
          pattern = r"<!--WAKAPI_START-->.*?<!--WAKAPI_END-->"
          new_content = re.sub(pattern, block.strip(), content, flags=re.DOTALL)

          with open("README.md", "w") as f:
            f.write(new_content)

          print("✅ Wakapi stats injected")
          EOF

      - name: Commit Wakapi Stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update wakapi stats"
          git push